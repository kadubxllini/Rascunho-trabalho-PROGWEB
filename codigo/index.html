<link rel="stylesheet" href="style.css">
<body>
    <div class="main-container">
        
      <div class="left-side">
        <div class="logo">Loja Online</div>
        <h1 class="welcome-text">Bem-vindo!</h1>
      </div>

      <div class="right-side">
        <div class="central-login">
          <div class="central-header">
            <h1>Faça login para acessar o nosso site.</h1>
          </div>
          
          <div class="input-login">
            <input type="text" placeholder="Username" class="user-input" required>
          </div>
          <div class="input-senha">
            <input type="password" placeholder="Password" class="senha-input" required>
          </div>

          <div class="check-button">
            <label>
              <input type="checkbox" value="1">
              Remember Me
            </label>
            <a href="#" class="forgot-password">Forgot Password?</a>
          </div>

          <div class="central-button">
            <button type="submit">Log in</button>
          </div>
        </div>
      </div>

    </div>
</body>
