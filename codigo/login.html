<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <title>Loja Online</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/login.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>

<body>

 <!-- BLOCO PRINCIPAL -->
  <div class="main-container">

    <!-- BLOCO ESQUERDO -->
    <div class="left-side">
      <h2>Loja Online</h2>
      <h1>Bem-vindo!</h1>
    </div>

    <!-- BLOCO DIREITO -->
    <div class="right-side">
      <div class="central-login">
        <div class="central-header">
          <h1>Digite seu usuário para acessar o nosso site.Faça login para acessar o nosso site.</h1>
        </div>

        <form onsubmit="fazerLogin(event)">

          <!-- CAMPO USUÁRIO / SENHA -->
          <div class="input-login">
            <input type="text" id="js-user" placeholder="Usuário" class="user-input" required>
          </div>
          <div class="input-senha">
            <input type="password" id="js-senha" placeholder="Senha" class="senha-input" required>
          </div>

          <!-- CAMPO CHECKBOX / ESQUECI SENHA -->
          <div class="check-button">
            <label>
              <input type="checkbox" value="1">
              Lembrar de mim
            </label>
            <a href="#" class="forgot-password">Esqueci minha senha</a>
          </div>

          <!-- CAMPO LOGIN -->
          <div class="central-button">
            <button type="submit">Entrar</button>
          </div>
          
        </form>
      </div>
    </div>
  </div>

<script src="js/login.js"></script>
</body>
</html>
